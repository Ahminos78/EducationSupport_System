x-backend-service: &backend-service
  restart: unless-stopped
  environment: &backend-environment
    SPRING_PROFILES_ACTIVE: docker
    NACOS_ENABLED: "true"
    SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    DB_HOST: mysql
    DB_PORT: 3306
    DB_NAME: edu_platform
    DB_USERNAME: root
    DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    TZ: Asia/Shanghai
  depends_on:
    mysql:
      condition: service_healthy
    nacos:
      condition: service_healthy

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: edu_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    volumes:
      - edu-mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nacos:
    image: nacos/nacos-server:v2.3.2
    platform: linux/amd64
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      TZ: Asia/Shanghai
    ports:
      - "18848:8848"
    volumes:
      - edu-nacos-data:/home/nacos/data
      - edu-nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  edu-user-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-user-service
    environment:
      <<: *backend-environment
      SERVER_PORT: 8010
    ports:
      - "8010:8010"

  edu-course-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-course-service
    environment:
      <<: *backend-environment
      SERVER_PORT: 8020
    ports:
      - "8020:8020"

  edu-enrollment-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-enrollment-service
    environment:
      <<: *backend-environment
      SERVER_PORT: 8030
    ports:
      - "8030:8030"

  edu-interaction-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-interaction-service
    environment:
      <<: *backend-environment
      SERVER_PORT: 8040
    ports:
      - "8040:8040"

  edu-assessment-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-assessment-service
    environment:
      <<: *backend-environment
      SERVER_PORT: 8050
    ports:
      - "8050:8050"

  edu-ai-service:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-ai-service
    environment:
      <<: *backend-environment
      SERVER_PORT: 8060
    ports:
      - "8060:8060"

  edu-gateway:
    <<: *backend-service
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        MODULE: edu-gateway
    environment:
      <<: *backend-environment
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      edu-user-service:
        condition: service_started
      edu-course-service:
        condition: service_started
      edu-enrollment-service:
        condition: service_started
      edu-interaction-service:
        condition: service_started
      edu-assessment-service:
        condition: service_started
      edu-ai-service:
        condition: service_started

  edu-frontend:
    build:
      context: edu-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      edu-gateway:
        condition: service_started

volumes:
  edu-mysql-data:
  edu-nacos-data:
  edu-nacos-logs:
