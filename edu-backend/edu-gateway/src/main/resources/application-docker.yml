server:
  port: 8080

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:nacos:8848}
        enabled: true
        register-enabled: true
        fail-fast: false
    gateway:
      routes:
        - id: edu-user-service
          uri: lb://edu-user-service
          predicates:
            - Path=/api/users/**
        - id: edu-course-service
          uri: lb://edu-course-service
          predicates:
            - Path=/api/courses/**
        - id: edu-enrollment-service
          uri: lb://edu-enrollment-service
          predicates:
            - Path=/api/enrollments/**
        - id: edu-assessment-service
          uri: lb://edu-assessment-service
          predicates:
            - Path=/api/assessments/**
        - id: edu-ai-service
          uri: lb://edu-ai-service
          predicates:
            - Path=/api/ai/**
