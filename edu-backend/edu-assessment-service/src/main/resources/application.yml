server:
  port: 8050

spring:
  application:
    name: edu-assessment-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/edu_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:18848
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

knife4j:
  enable: true

edu:
  assessment:
    storage-dir: ${ASSESSMENT_STORAGE_DIR:./data/assessment-files}
  jwt:
    secret: edu-platform-dev-secret-change-me
    expire-seconds: 86400
  auth:
    path-patterns:
      - /api/assessments/**
