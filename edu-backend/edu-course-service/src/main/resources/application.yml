server:
  port: 8020

spring:
  application:
    name: edu-course-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:edu_platform}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:18848
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

edu:
  jwt:
    secret: ${EDU_JWT_SECRET:edu-platform-dev-secret-change-me}
    expire-seconds: 86400
  auth:
    path-patterns:
      - /api/courses/**
