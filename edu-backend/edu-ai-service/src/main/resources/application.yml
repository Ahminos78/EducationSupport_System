server:
  port: 8060

spring:
  application:
    name: edu-ai-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:127.0.0.1:18848}
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}

  ai:
    # DeepSeek 负责 Chat（大模型对话），通过 OpenAI 兼容协议接入
    openai:
      api-key: ${EDU_AI_DEEPSEEK_API_KEY:}
      base-url: ${EDU_AI_DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${EDU_AI_DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.7
          max-tokens: 2048
    # Chroma 向量数据库
    vectorstore:
      chroma:
        client:
          host: ${EDU_AI_CHROMA_HOST:http://localhost}
          port: ${EDU_AI_CHROMA_PORT:8000}
        collection-name: ${EDU_AI_CHROMA_COLLECTION:edu_knowledge_base}
        initialize-schema: true

# SiliconFlow 嵌入模型配置（DeepSeek 不支持 embeddings，用硅基流动替代）
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:}
  base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
  embedding:
    model: ${SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-large-zh-v1.5}

# 自定义 AI 配置（供应用层读取）
edu:
  jwt:
    secret: ${EDU_JWT_SECRET:edu-platform-ai-service-secret}
    expire-seconds: 86400
  auth:
    path-patterns:
      - /api/ai/**
    exclude-paths:
      - /api/ai/health
      - /api/ai/config
      - /api/ai/chat
      - /api/ai/chat/session
      - /api/ai/knowledge/**
      - /api/ai/rag/**
      - /doc.html
      - /favicon.ico
      - /webjars/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs
      - /v3/api-docs/**
      - /swagger-resources
      - /swagger-resources/**
  ai:
    deepseek:
      api-key: ${EDU_AI_DEEPSEEK_API_KEY:}
      base-url: ${EDU_AI_DEEPSEEK_BASE_URL:https://api.deepseek.com}
      model: ${EDU_AI_DEEPSEEK_MODEL:deepseek-chat}
      temperature: 0.7
      max-tokens: 2048

    default-model: ${EDU_AI_DEEPSEEK_MODEL:deepseek-chat}
    system-prompt: "你是一个在线教育平台的 AI 教学助手，你的名称是「学伴」。请使用中文回答用户的问题，回答要简洁、准确、有帮助。当遇到课程相关问题时，结合提供的知识库内容进行回答。"
    vector-store:
      similarity-threshold: 0.7
      max-results: 5
    rag:
      enabled: ${EDU_AI_RAG_ENABLED:false}
      document-dir: ${EDU_AI_DOCUMENT_DIR:./data/documents}
