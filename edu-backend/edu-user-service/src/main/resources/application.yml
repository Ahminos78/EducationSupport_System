server:
  port: 8010

spring:
  application:
    name: edu-user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/edu_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:18848
        enabled: ${NACOS_ENABLED:false}
        register-enabled: ${NACOS_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true

edu:
  jwt:
    secret: edu-platform-dev-secret-change-me
    expire-seconds: 86400
  auth:
    path-patterns:
      - /api/users/**
    exclude-paths:
      - /api/users/login
      - /api/users/register
      - /api/users/quick-login
      - /api/users/forgot-password/**
      - /api/users/*/public
      - /doc.html
      - /favicon.ico
      - /webjars/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs
      - /v3/api-docs/**
      - /swagger-resources
      - /swagger-resources/**
  bootstrap:
    admin-username: admin
    admin-password: admin123
    admin-nickname: 系统管理员
